# 301 redirects for legacy blog slugs renamed 2026-04-09 so URLs match post titles.
# Patterns are regex (Grav anchors with ^ automatically); the trailing /?$ keeps
# them exact-match so e.g. /decision doesn't also catch /decision_theory_...,
# and (/blog)? covers both the canonical /<slug> form and the /blog/<slug> form.
# The [301] suffix on the target tells Grav::redirect() to use HTTP 301 (permanent)
# instead of the default 302, so search engines transfer link equity.
