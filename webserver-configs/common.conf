# Snapshot of /etc/caddy/common.conf on the herculaneum droplet, captured
# 2026-04-09. NOT used at runtime by Caddy from this repo — production
# reads from /etc/caddy/common.conf (imported by /etc/caddy/Caddyfile via
# the `import /etc/caddy/common.conf` directive). Kept here for version
# control and disaster recovery only. See sibling Caddyfile for restore
# instructions.

# compression
encode zstd gzip

# return denied on 403 status
respond /forbidden 403

# http custom response header
header {
    # prevent some browsers from MIME-sniffing a response away from the declared Content-Type
    X-Content-Type-Options "nosniff"

    # disallow the site to be rendered within a frame (clickjacking protection)
    X-Frame-Options "DENY"

    # referrer policy
    Referrer-Policy "no-referrer"

    # remove server field
    -Server

    # strip Caddy's malformed `Via: 0.0 Caddy` header — Caddy's FastCGI gateway
    # synthesises an empty HTTP version on FastCGI responses, producing a Via
    # value with version "0.0" that Chrome's HTTP/2 stack rejects on 304
    # responses (ERR_HTTP2_PROTOCOL_ERROR on conditional GETs / regular CMD+R
    # refresh, while CMD+SHIFT+R works). Strip it everywhere.
    -Via

    # strip the HTTP/1.0 `Pragma: no-cache` relic that PHP's session_start()
    # auto-emits via session_cache_limiter; obsolete and noisy.
    -Pragma

    # disable selective browser features and APIs
    Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()"

    # content security policy to force https
    Content-Security-Policy "default-src https: 'unsafe-inline' 'unsafe-eval'"
}

# cache: long-lived for static assets, short for everything else
@static {
    path /assets/* /user/themes/* /user/pages/*/images/*
}
header @static Cache-Control "max-age=31536000, immutable"
header @static Expires "Thu, 31 Dec 2037 23:55:55 GMT"
@notStatic {
    not path /assets/* /user/themes/* /user/pages/*/images/*
}
header @notStatic >Cache-Control "max-age=0, must-revalidate"
header @notStatic >Expires "0"

# tls config — Caddy defaults are Mozilla-Intermediate equivalent; the previous
# block pinned key_type/curves/ciphers and broke HTTP/3. Keep it minimal.
tls gregory@gregorykelleher.com

# security config

# deny all direct access for these folders
rewrite /(\.git|cache|bin|logs|backups|tests)/.* /403

# deny running scripts inside core system folders
rewrite /(system|vendor)/.*\.(txt|xml|md|html|htm|shtml|shtm|yaml|yml|php|php2|php3|php4|php5|phar|phtml|pl|py|cgi|twig|sh|bat)$ /403

# deny running scripts inside user folder
rewrite /user/.*\.(txt|md|yaml|yml|php|php2|php3|php4|php5|phar|phtml|pl|py|cgi|twig|sh|bat)$ /403

# deny access to specific files in the root folder
rewrite /(LICENSE\.txt|composer\.lock|composer\.json|nginx\.conf|web\.config|htaccess\.txt|\.htaccess) /403

respond /403 403
## End - Security

# global rewrite should come last.
try_files {path} {path}/ /index.php?_url={uri}&{query}
